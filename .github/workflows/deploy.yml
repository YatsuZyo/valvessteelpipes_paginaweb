name: Deploy MAFM Valves Landing

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Deploy to cPanel
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        # IMPORTANTE: 
        # Si tus archivos deben ir dentro de public_html, ajusta server-dir.
        # Si el usuario de FTP ya entra directo a la carpeta de la web, déjalo como ./
        server-dir: ./ 
        local-dir: ./
